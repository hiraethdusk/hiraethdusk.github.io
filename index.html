<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hiraethdusk</title>
  <meta name="description" content="little web toys, made slowly and on purpose." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext x='8' y='13' text-anchor='middle' font-size='13'%3E%F0%9F%8C%87%3C/text%3E%3C/svg%3E" />

  <!-- fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />

  <!-- shared foundations, themes, then this page's styles -->
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/themes.css" />
  <link rel="stylesheet" href="/assets/css/home.css" />
  <script src="/assets/js/theme.js"></script>
</head>
<body>

  <header class="sky grain">
    <div class="sky-sun"></div>
    <div class="sky-inner">
      <h1 class="wordmark">hiraethdusk</h1>
      <p class="tagline">little web toys, made slowly and on purpose.</p>
    </div>
  </header>

  <main class="shelf-wrap">
    <p class="eyebrow">the shelf</p>

    <div class="books">
      <!-- ── Add a new toy: copy one <a class="book"> block ────────────
           href      → the folder path, e.g. /brackets/
           --book-c  → spine colour: --book-1 … --book-6 (themable)
           --book-h  → optional height in px (default: 160px)
           --book-w  → optional spine width in px (default: 40px)
           emblem    → the toy's emoji sticker
           ──────────────────────────────────────────────────────────── -->
      <a class="book" href="/spinner/" style="--book-c: var(--book-1); --book-h: 170px; --book-w: 44px;">
        <span class="book-spine">
          <span class="book-title">spinner</span>
          <span class="book-emblem" aria-hidden="true">🎡</span>
        </span>
      </a>
      <a class="book" href="/dice/" style="--book-c: var(--book-2); --book-h: 152px; --book-w: 38px;">
        <span class="book-spine">
          <span class="book-title">dice</span>
          <span class="book-emblem" aria-hidden="true">🎲</span>
        </span>
      </a>

      <span class="shelf-note">more soon…</span>

      <div class="shelf-plant" aria-hidden="true">
        <span class="plant-leaves">
          <i class="leaf leaf-1"></i><i class="leaf leaf-2"></i><i class="leaf leaf-3"></i>
        </span>
        <span class="plant-pot"></span>
      </div>
    </div>
    <div class="shelf-plank"></div>
  </main>

  <footer class="foot">
    <p class="def"><b>hiraeth</b> · a soft longing for a home that maybe never was</p>
    <p>made by hiraethdusk</p>
  </footer>

</body>
</html>
