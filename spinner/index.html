<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>spinner · hiraethdusk</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext x='8' y='13' text-anchor='middle' font-size='13'%3E%F0%9F%8E%A1%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/themes.css" />
  <link rel="stylesheet" href="/assets/css/toy.css" />
  <link rel="stylesheet" href="/assets/css/spinner.css" />
  <script src="/assets/js/theme.js"></script>
  <script src="/assets/js/panel.js" defer></script>
</head>
<body>

  <a class="btn back" href="/">← back</a>

  <h1>spinner 🎡</h1>

  <div class="toy-layout">
    <div class="stage">
      <div class="wheel-wrap">
        <canvas id="wheel" width="600" height="600"></canvas>
        <div class="hub"></div>
      </div>
      <button class="btn" id="spin-btn">spin</button>
      <div class="result" id="result"></div>
    </div>

    <aside class="panel">
      <button class="panel-title" type="button" aria-expanded="true">⚙ options</button>
      <div class="panel-body">
        <div class="edit-inner" id="edit-inner">
          <!-- rows injected by JS -->
        </div>
        <p class="hint">changes apply instantly. tap ⭐ to pick the winner — tap it again for a fair spin.</p>
        <button class="adv-toggle" id="adv-btn" type="button">advanced ▸ slice sizes</button>
        <p class="adv-note">shares are relative — they don't need to add up to 100. with no ⭐ set, bigger shares really do win more often.</p>
        <div class="edit-actions">
          <button class="btn" id="add-btn" style="--btn-accent:var(--sage);">+ add option</button>
        </div>
      </div>
    </aside>
  </div>

<script>
// ============================================================
//  How the winner is forced
//  The wheel draws slices sized by their weights and spins with
//  real deceleration — it looks fair. Before the animation
//  starts we compute what final rotation puts the pointer inside
//  the winner's slice, then pick a total spin that lands there.
//  A random offset within the slice means it never stops at
//  exactly the centre.
// ============================================================

const canvas = document.getElementById('wheel');
const ctx    = canvas.getContext('2d');
const W      = canvas.width;
const CX     = W / 2, CY = W / 2, R = W / 2 - 8;

// ---- palette: read from the CSS tokens, so themes (dawn swaps
// the coral) recolour the wheel too. Refreshed on theme change. ----
const ACCENT_TOKENS = ['--peach', '--sky', '--rose', '--sage', '--gold', '--coral'];

function readPalette() {
  const cs = getComputedStyle(document.documentElement);
  const cols = ACCENT_TOKENS.map(t => cs.getPropertyValue(t).trim());
  cols.push('#c9b8ec'); // soft lavender — the one colour with no token
  return cols;
}

let SLICE_COLOURS = readPalette();

window.addEventListener('hd-theme', () => {
  SLICE_COLOURS = readPalette();
  drawWheel(rotation);
});

// ---- state ----
let options   = ['Pizza', 'Tacos', 'Sushi', 'Burgers', 'Pasta'];
let weights   = options.map(() => 20); // each slice's share; normalised wherever used
let winnerIdx = 0;      // option that always wins; null = fair spin
let rotation  = 0;      // current wheel rotation in radians
let spinning  = false;

// weights are relative shares — they don't need to add up to 100.
// this cleans them for the maths: blanks/zeros drop out, and if
// everything is blank the wheel falls back to equal slices.
function effWeights() {
  const w = weights.map(v => (isFinite(v) && v > 0) ? v : 0);
  const total = w.reduce((s, x) => s + x, 0);
  if (total === 0) return options.map(() => 1);
  return w;
}

// ---- draw ----
function drawWheel(rot) {
  ctx.clearRect(0, 0, W, W);
  const n     = options.length;
  const w     = effWeights();
  const total = w.reduce((s, x) => s + x, 0);
  let angle   = rot - Math.PI / 2;

  options.forEach((label, i) => {
    const sliceAngle = (2 * Math.PI) * w[i] / total;
    const start = angle;
    const end   = angle + sliceAngle;
    angle = end;

    // slice fill
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, R, start, end);
    ctx.closePath();
    ctx.fillStyle = SLICE_COLOURS[i % SLICE_COLOURS.length];
    ctx.fill();

    // slice border
    ctx.strokeStyle = 'rgba(63,53,58,0.18)';
    ctx.lineWidth   = 2;
    ctx.stroke();

    // label
    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(start + sliceAngle / 2);
    ctx.textAlign    = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillStyle    = '#3f353a';
    ctx.font         = `bold ${Math.max(16, Math.min(26, Math.floor(420 / n)))}px "Fredoka", sans-serif`;
    ctx.fillText(label.length > 11 ? label.slice(0, 10) + '…' : label, R - 18, 0);
    ctx.restore();
  });
}

// ---- spin math ----
// The pointer sits at the top (−π/2 from 0 radians in canvas coords).
// Slices are laid out clockwise by weight, so the winner's slice spans
// [before, before + w] as a fraction of the total. We aim for a random
// point in the middle 60% of that span, so the wheel never stops at
// exactly the centre — it lands somewhere believably off.
function getSpin() {
  const revs = 5 + Math.floor(Math.random() * 4);

  // no winner set: a genuinely fair spin — any angle is equally likely,
  // so each slice's chance is exactly its share of the wheel
  if (winnerIdx === null) {
    return Math.random() * 2 * Math.PI + revs * 2 * Math.PI;
  }

  const w      = effWeights();
  const total  = w.reduce((s, x) => s + x, 0);
  const before = w.slice(0, winnerIdx).reduce((s, x) => s + x, 0);
  const f      = 0.2 + Math.random() * 0.6; // fraction within the winning slice
  const target = -(2 * Math.PI) * (before + f * w[winnerIdx]) / total;
  const cur    = ((rotation % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
  const tNorm  = ((target % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
  let delta = tNorm - cur;
  if (delta < 0) delta += 2 * Math.PI;
  return delta + revs * 2 * Math.PI;
}

// which slice is under the pointer for the current rotation
function landedIndex() {
  const w = effWeights();
  const total = w.reduce((s, x) => s + x, 0);
  const a = (((-rotation) % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
  let cum = 0;
  for (let i = 0; i < w.length; i++) {
    cum += (2 * Math.PI) * w[i] / total;
    if (a < cum) return i;
  }
  return w.length - 1;
}

// ---- animation ----
// Uses an ease-out cubic so deceleration looks natural/physical.
function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

function spin() {
  if (spinning) return;
  spinning = true;

  const resultEl = document.getElementById('result');
  resultEl.classList.remove('show');
  resultEl.textContent = '';

  const totalAngle = getSpin();
  const duration   = 3500 + Math.random() * 1000; // 3.5–4.5s
  const startRot   = rotation;
  let   startTime  = null;

  function frame(ts) {
    if (!startTime) startTime = ts;
    const elapsed = ts - startTime;
    const t       = Math.min(elapsed / duration, 1);
    rotation      = startRot + totalAngle * easeOut(t);
    drawWheel(rotation);

    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      spinning = false;
      resultEl.textContent = '🎉 ' + options[landedIndex()] + '!';
      resultEl.classList.add('show');
    }
  }
  requestAnimationFrame(frame);
}

document.getElementById('spin-btn').addEventListener('click', spin);

// ---- edit panel ----
// Every input writes straight into options/weights and redraws the
// wheel — no apply button. Rows are only rebuilt when one is added
// or removed, and since state is always current, nothing is lost.
function buildEditRows() {
  const container = document.getElementById('edit-inner');
  container.innerHTML = '';
  options.forEach((opt, i) => {
    const row = document.createElement('div');
    row.className = 'edit-row';

    const wrap = document.createElement('span');
    wrap.className = 'input-wrap';

    const input = document.createElement('input');
    input.type  = 'text';
    input.value = opt;
    input.addEventListener('input', () => {
      options[i] = input.value.trim();
      drawWheel(rotation);
    });
    wrap.appendChild(input);

    // × in the corner, shown on hover — a wheel needs at least two slices
    if (options.length > 2) {
      const del = document.createElement('button');
      del.className = 'del-btn';
      del.type = 'button';
      del.textContent = '×';
      del.title = 'remove this option';
      del.addEventListener('click', () => {
        options.splice(i, 1);
        weights.splice(i, 1);
        if (winnerIdx === i) winnerIdx = null;
        else if (winnerIdx !== null && winnerIdx > i) winnerIdx--;
        buildEditRows();
        drawWheel(rotation);
      });
      wrap.appendChild(del);
    }

    // slice share, only visible when advanced is open
    const pct = document.createElement('input');
    pct.type      = 'number';
    pct.className = 'pct';
    pct.min       = '0';
    pct.step      = '0.5';
    pct.value     = Math.round(weights[i] * 100) / 100;
    pct.title     = 'share of the wheel';
    pct.addEventListener('input', () => {
      const v = parseFloat(pct.value);
      weights[i] = (isFinite(v) && v > 0) ? v : 0;
      drawWheel(rotation);
    });

    const star = document.createElement('button');
    star.className = 'star-btn' + (i === winnerIdx ? ' winner' : '');
    star.textContent = '⭐';
    star.title = 'set as winner (tap again for a fair spin)';
    star.addEventListener('click', () => {
      // tapping the current winner un-rigs the wheel
      winnerIdx = (winnerIdx === i) ? null : i;
      container.querySelectorAll('.star-btn').forEach((b, j) => {
        b.classList.toggle('winner', j === winnerIdx);
      });
    });

    row.appendChild(wrap);
    row.appendChild(pct);
    row.appendChild(star);
    container.appendChild(row);
  });
}

// the advanced toggle reveals the per-slice share inputs
document.getElementById('adv-btn').addEventListener('click', () => {
  const open = document.getElementById('edit-inner').classList.toggle('show-adv');
  document.getElementById('adv-btn').textContent =
    open ? 'advanced ▾ slice sizes' : 'advanced ▸ slice sizes';
});

document.getElementById('add-btn').addEventListener('click', () => {
  options.push('option ' + (options.length + 1));
  // new slice gets the average share, so the wheel stays balanced
  weights.push(weights.reduce((s, w) => s + w, 0) / weights.length || 20);
  buildEditRows();
  drawWheel(rotation);
});

// ---- init ----
buildEditRows();
drawWheel(rotation);
</script>
</body>
</html>
