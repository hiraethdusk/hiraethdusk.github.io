<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spinner · hiraethdusk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/themes.css" />
  <link rel="stylesheet" href="/assets/css/spinner.css" />
  <script src="/assets/js/theme.js"></script>
</head>
<body>

  <a class="btn back" href="/">← back</a>

  <h1>Spinner 🎡</h1>

  <div class="wheel-wrap">
    <canvas id="wheel" width="600" height="600"></canvas>
    <div class="hub"></div>
  </div>

  <div class="controls">
    <button class="btn" id="spin-btn">Spin</button>
    <div class="result" id="result"></div>

    <details>
      <summary>edit options</summary>
      <div class="edit-inner" id="edit-inner">
        <!-- rows injected by JS -->
      </div>
      <button class="adv-toggle" id="adv-btn" type="button">advanced ▸ slice sizes</button>
      <p class="adv-note">each number is a slice's share of the wheel (%) — sizes are how it looks and feels, the ⭐ still decides the winner.</p>
      <div class="edit-actions" style="padding: 0 1.2rem 1rem;">
        <button class="btn" id="add-btn" style="--btn-accent:var(--sage);">+ add option</button>
        <button class="btn" id="apply-btn" style="--btn-accent:var(--coral);">apply</button>
      </div>
    </details>
  </div>

<script>
// ============================================================
//  How the winner is forced
//  The wheel draws slices sized by their weights and spins with
//  real deceleration — it looks fair. Before the animation
//  starts we compute what final rotation puts the pointer inside
//  the winner's slice, then pick a total spin that lands there.
//  A random offset within the slice means it never stops at
//  exactly the centre.
// ============================================================

const canvas = document.getElementById('wheel');
const ctx    = canvas.getContext('2d');
const W      = canvas.width;
const CX     = W / 2, CY = W / 2, R = W / 2 - 8;

// ---- palette: same tokens as base.css, kept in sync manually ----
const SLICE_COLOURS = [
  '#f9b48f', // peach
  '#9ec9d8', // sky
  '#f2a7b8', // rose
  '#a9ccae', // sage
  '#f6cf7d', // gold
  '#f58a72', // coral
  '#c9b8ec', // soft lavender (one controlled use, as a 6th)
];

// ---- state ----
let options   = ['Pizza', 'Tacos', 'Sushi', 'Burgers', 'Pasta'];
let weights   = options.map(() => 20); // each slice's share; normalised wherever used
let winnerIdx = 0;      // index of the option that always wins
let rotation  = 0;      // current wheel rotation in radians
let spinning  = false;

// ---- draw ----
function drawWheel(rot) {
  ctx.clearRect(0, 0, W, W);
  const n     = options.length;
  const total = weights.reduce((s, w) => s + w, 0);
  let angle   = rot - Math.PI / 2;

  options.forEach((label, i) => {
    const sliceAngle = (2 * Math.PI) * weights[i] / total;
    const start = angle;
    const end   = angle + sliceAngle;
    angle = end;

    // slice fill
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, R, start, end);
    ctx.closePath();
    ctx.fillStyle = SLICE_COLOURS[i % SLICE_COLOURS.length];
    ctx.fill();

    // slice border
    ctx.strokeStyle = 'rgba(63,53,58,0.18)';
    ctx.lineWidth   = 2;
    ctx.stroke();

    // label
    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(start + sliceAngle / 2);
    ctx.textAlign    = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillStyle    = '#3f353a';
    ctx.font         = `bold ${Math.max(16, Math.min(26, Math.floor(420 / n)))}px "Fredoka", sans-serif`;
    ctx.fillText(label.length > 11 ? label.slice(0, 10) + '…' : label, R - 18, 0);
    ctx.restore();
  });
}

// ---- spin math ----
// The pointer sits at the top (−π/2 from 0 radians in canvas coords).
// Slices are laid out clockwise by weight, so the winner's slice spans
// [before, before + w] as a fraction of the total. We aim for a random
// point in the middle 60% of that span, so the wheel never stops at
// exactly the centre — it lands somewhere believably off.
function getSpin() {
  const total  = weights.reduce((s, w) => s + w, 0);
  const before = weights.slice(0, winnerIdx).reduce((s, w) => s + w, 0);
  const f      = 0.2 + Math.random() * 0.6; // fraction within the winning slice
  const target = -(2 * Math.PI) * (before + f * weights[winnerIdx]) / total;
  const cur    = ((rotation % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
  const tNorm  = ((target % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
  let delta = tNorm - cur;
  if (delta < 0) delta += 2 * Math.PI;
  const revs = 5 + Math.floor(Math.random() * 4);
  return delta + revs * 2 * Math.PI;
}

// ---- animation ----
// Uses an ease-out cubic so deceleration looks natural/physical.
function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

function spin() {
  if (spinning) return;
  spinning = true;

  const resultEl = document.getElementById('result');
  resultEl.classList.remove('show');
  resultEl.textContent = '';

  const totalAngle = getSpin();
  const duration   = 3500 + Math.random() * 1000; // 3.5–4.5s
  const startRot   = rotation;
  let   startTime  = null;

  function frame(ts) {
    if (!startTime) startTime = ts;
    const elapsed = ts - startTime;
    const t       = Math.min(elapsed / duration, 1);
    rotation      = startRot + totalAngle * easeOut(t);
    drawWheel(rotation);

    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      spinning = false;
      resultEl.textContent = '🎉 ' + options[winnerIdx] + '!';
      resultEl.classList.add('show');
    }
  }
  requestAnimationFrame(frame);
}

document.getElementById('spin-btn').addEventListener('click', spin);

// ---- edit panel ----
function buildEditRows() {
  const container = document.getElementById('edit-inner');
  const total = weights.reduce((s, w) => s + w, 0);
  container.innerHTML = '';
  options.forEach((opt, i) => {
    const row = document.createElement('div');
    row.className = 'edit-row';

    const input = document.createElement('input');
    input.type  = 'text';
    input.value = opt;

    // slice share (%), only visible when advanced is open
    const pct = document.createElement('input');
    pct.type      = 'number';
    pct.className = 'pct';
    pct.min       = '0.5';
    pct.step      = '0.5';
    pct.value     = Math.round(weights[i] / total * 1000) / 10;
    pct.title     = 'share of the wheel (%)';

    const star = document.createElement('button');
    star.className = 'star-btn' + (i === winnerIdx ? ' winner' : '');
    star.textContent = '⭐';
    star.title = 'set as winner';
    star.addEventListener('click', () => {
      winnerIdx = i;
      container.querySelectorAll('.star-btn').forEach((b, j) => {
        b.classList.toggle('winner', j === i);
      });
    });

    row.appendChild(input);
    row.appendChild(pct);
    row.appendChild(star);
    container.appendChild(row);
  });
}

// the advanced toggle reveals the per-slice % inputs
document.getElementById('adv-btn').addEventListener('click', () => {
  const open = document.getElementById('edit-inner').classList.toggle('show-adv');
  document.getElementById('adv-btn').textContent =
    open ? 'advanced ▾ slice sizes' : 'advanced ▸ slice sizes';
});

document.getElementById('add-btn').addEventListener('click', () => {
  options.push('Option ' + (options.length + 1));
  // new slice gets the average share, so the wheel stays balanced
  weights.push(weights.reduce((s, w) => s + w, 0) / weights.length);
  buildEditRows();
});

document.getElementById('apply-btn').addEventListener('click', () => {
  const rows = document.querySelectorAll('#edit-inner .edit-row');
  options = [];
  weights = [];
  rows.forEach(row => {
    options.push(row.querySelector('input[type="text"]').value.trim() || '?');
    const v = parseFloat(row.querySelector('.pct').value);
    weights.push(isFinite(v) && v > 0 ? v : 100 / rows.length);
  });
  if (winnerIdx >= options.length) winnerIdx = 0;
  buildEditRows(); // re-render so the % column shows normalised values
  drawWheel(rotation);
  document.getElementById('result').classList.remove('show');
});

// ---- init ----
buildEditRows();
drawWheel(rotation);
</script>
</body>
</html>
